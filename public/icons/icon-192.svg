    <line x1="36" y1="8" x2="40" y2="8" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <line x1="-36" y1="8" x2="-40" y2="8" stroke="white" stroke-width="4" stroke-linecap="round"/>
